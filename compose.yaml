# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose

services:
  alonechat-server:
    image: alonechat/server:latest
    build:
      context: .
    ports:
      - "8765:8765"
      - "8766:8766"
    environment:
      - JWT_SECRET=${JWT_SECRET:-default-secret-key-change-in-production}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-9000}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-alonechat}
      - CLICKHOUSE_ENABLED=${CLICKHOUSE_ENABLED:-true}
      - PURE_SERVER_ENVIRON=true
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - alonechat-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: alonechat-clickhouse
    restart: always
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-alonechat}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT:-1}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alonechat-network

networks:
  alonechat-network:
    driver: bridge

volumes:
  clickhouse-data:
  clickhouse-logs:

