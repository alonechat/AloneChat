# In the hope of making this project more easier to depoly,
# We made this file to help you quickly start the server and clickhouse with docker compose.
# This maybe unstable, so if you encountered any problem, plz go to our GitHub repo and
# submit an issue https://github.com/alonechat/AloneChat , we will try our best to fix it.

services:
  chat-server:
    image: alonechat/server:latest
    container_name: alonechat-server
    restart: always

    build:
      context: .
      # args:
      #   - JWT_SECRET=${JWT_SECRET:-default-secret-key-change-in-production}
    ports:
      - "8766:8766"

    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET:-default-secret-key-change-in-production}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-localhost}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-9000}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-alonechat}
      - CLICKHOUSE_ENABLED=${CLICKHOUSE_ENABLED:-true}
      - CONTAINER_MODE=true
      - AC_PROCESS_WORKERS=${AC_PROCESS_WORKERS:-15}
      - AC_THREAD_WORKERS=${AC_THREAD_WORKERS:-60}
      - AC_IO_WORKERS=${AC_IO_WORKERS:-9}
      - AC_DB_WORKERS=${AC_DB_WORKERS:-6}
    volumes:
      - alonechat-server-logs:/app/logs
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - alonechat-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: alonechat-clickhouse
    restart: always

    env_file:
      - .env
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-alonechat}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT:-1}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alonechat-network

networks:
  alonechat-network:
    driver: bridge

volumes:
  clickhouse-data:
  clickhouse-logs:
  alonechat-server-logs:
